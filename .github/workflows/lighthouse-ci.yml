name: Lighthouse CI Performance Monitoring
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'

concurrency:
  group: lighthouse-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm build

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: './lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Performance Report Summary
        if: always()
        run: |
          echo "## Lighthouse Performance Results" >> $GITHUB_STEP_SUMMARY
          if [ -f "./lighthouse-results.json" ]; then
            echo "Performance tests completed" >> $GITHUB_STEP_SUMMARY
          else
            echo "No results found. Check the Lighthouse CI step." >> $GITHUB_STEP_SUMMARY
          fi
